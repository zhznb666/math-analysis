    <script>
        // ===================== 级数理论知识点数据 =====================
        const seriesData = [
            {
                id: 'convergence',
                title: '级数的收敛性',
                definition: `
                    <p><strong>定义</strong>：设级数 \\(\\sum_{n=1}^{\\infty} u_n\\)，其部分和 \\(S_n = \\sum_{k=1}^{n} u_k\\)。若 \\(\\lim_{n \\to \\infty} S_n = S\\) 存在有限，则称级数<strong>收敛</strong>，S 为级数的和；否则称级数<strong>发散</strong>。</p>
                    <p class="mt-2"><strong>柯西收敛准则</strong>：级数收敛 \\(\\iff\\) 对任意 \\(\\varepsilon>0\\)，存在 N，当 \\(n>N\\) 时，对任意正整数 p，有 \\(|u_{n+1}+\\cdots+u_{n+p}|<\\varepsilon\\)。</p>
                    <p class="mt-2"><strong>必要条件</strong>：若级数收敛，则 \\(\\lim_{n \\to \\infty} u_n = 0\\)。逆命题不成立。</p>
                `,
                exercises: [
                    { question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{1}{n(n+1)}\\) 的敛散性，收敛则求和。', answer: '裂项得 \\(S_n = 1-\\frac{1}{n+1} \\to 1\\)，级数收敛，和为1。' },
                    { question: '证明调和级数 \\(\\sum_{n=1}^{\\infty} \\frac{1}{n}\\) 发散。', answer: '取 p=n，\\(S_{2n}-S_n = \\frac{1}{n+1}+\\cdots+\\frac{1}{2n} > \\frac{1}{2}\\)，不满足柯西准则，故发散。' }
                ]
            },
            {
                id: 'positive1',
                title: '正项级数（1）- 比较判别法',
                definition: `
                    <p><strong>基本定理</strong>：正项级数收敛 \\(\\iff\\) 部分和数列有上界。</p>
                    <p class="mt-2"><strong>比较判别法</strong>：设 \\(0 \\leq u_n \\leq v_n\\)（n充分大），则大收小必收，小散大必散。</p>
                    <p class="mt-2"><strong>极限形式</strong>：设 \\(\\lim_{n \\to \\infty} \\frac{u_n}{v_n} = l\\)，\\(0<l<+\\infty\\) 时两级数同敛散；\\(l=0\\) 时大收则小收；\\(l=+\\infty\\) 时大散则小散。</p>
                `,
                exercises: [
                    { question: '判断 \\(\\sum_{n=1}^{\\infty} \\sin\\frac{1}{n}\\) 的敛散性。', answer: '\\(\\lim_{n\\to\\infty} \\frac{\\sin(1/n)}{1/n}=1\\)，调和级数发散，故原级数发散。' },
                    { question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{1}{2^n - n}\\) 的敛散性。', answer: '与等比级数 \\(\\sum 1/2^n\\) 比较，极限为1，等比级数收敛，故原级数收敛。' }
                ]
            },
            {
                id: 'ratio',
                title: '正项级数 - 比式判别法',
                definition: `
                    <p><strong>达朗贝尔判别法</strong>：设正项级数 \\(\\sum u_n\\)，\\(\\lim_{n \\to \\infty} \\frac{u_{n+1}}{u_n} = q\\)：</p>
                    <ul class="list-disc list-inside mt-1 ml-4">
                        <li>\\(q < 1\\) 时级数收敛</li>
                        <li>\\(q > 1\\) 或 \\(q=+\\infty\\) 时级数发散</li>
                        <li>\\(q = 1\\) 时判别法失效</li>
                    </ul>
                    <p class="mt-2 text-sm text-gray-600">适用于通项含阶乘、指数形式的级数。</p>
                `,
                exercises: [
                    { question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{n!}{n^n}\\) 的敛散性。', answer: '\\(\\frac{u_{n+1}}{u_n} = \\left(\\frac{n}{n+1}\\right)^n \\to \\frac{1}{e} < 1\\)，级数收敛。' },
                    { question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{2^n}{n}\\) 的敛散性。', answer: '\\(\\frac{u_{n+1}}{u_n} = 2 \\cdot \\frac{n}{n+1} \\to 2 > 1\\)，级数发散。' }
                ]
            },
            {
                id: 'root',
                title: '正项级数 - 根式判别法',
                definition: `
                    <p><strong>柯西根式判别法</strong>：设正项级数 \\(\\sum u_n\\)，\\(\\lim_{n \\to \\infty} \\sqrt[n]{u_n} = q\\)：</p>
                    <ul class="list-disc list-inside mt-1 ml-4">
                        <li>\\(q < 1\\) 时级数收敛</li>
                        <li>\\(q > 1\\) 时级数发散</li>
                        <li>\\(q = 1\\) 时判别法失效</li>
                    </ul>
                    <p class="mt-2">适用范围广于比式判别法：若比式极限存在，则根式极限必存在且相等。</p>
                `,
                exercises: [
                    { question: '判断 \\(\\sum_{n=1}^{\\infty} \\left(\\frac{n}{2n+1}\\right)^n\\) 的敛散性。', answer: '\\(\\sqrt[n]{u_n} = \\frac{n}{2n+1} \\to \\frac{1}{2} < 1\\)，级数收敛。' },
                    { question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{n^2}{(2+1/n)^n}\\) 的敛散性。', answer: '\\(\\sqrt[n]{u_n} \\to \\frac{1}{2} < 1\\)，级数收敛。' }
                ]
            },
            {
                id: 'integral',
                title: '正项级数 - 积分判别法',
                definition: `
                    <p><strong>积分判别法</strong>：设 f(x) 在 \\([1,+\\infty)\\) 上非负递减，则 \\(\\sum_{n=1}^{\\infty} f(n)\\) 与 \\(\\int_{1}^{+\\infty} f(x)dx\\) 同敛散。</p>
                    <p class="mt-2"><strong>p-级数</strong>：\\(\\sum_{n=1}^{\\infty} \\frac{1}{n^p}\\)，p>1 收敛，p≤1 发散。</p>
                    <p class="mt-2"><strong>对数p-级数</strong>：\\(\\sum_{n=2}^{\\infty} \\frac{1}{n(\\ln n)^p}\\)，p>1 收敛，p≤1 发散。</p>
                `,
                exercises: [
                    { question: '判断 \\(\\sum_{n=2}^{\\infty} \\frac{1}{n \\ln n}\\) 的敛散性。', answer: '积分 \\(\\int_2^\\infty \\frac{dx}{x\\ln x} = +\\infty\\) 发散，故级数发散。' },
                    { question: '判断 \\(\\sum_{n=2}^{\\infty} \\frac{1}{n(\\ln n)^2}\\) 的敛散性。', answer: '积分收敛于 \\(\\frac{1}{\\ln 2}\\)，故级数收敛。' }
                ]
            },
            {
                id: 'alternating',
                title: '交错级数',
                definition: `
                    <p><strong>定义</strong>：形如 \\(\\sum_{n=1}^{\\infty} (-1)^{n+1} u_n\\)（\\(u_n>0\\)）的级数为交错级数。</p>
                    <p class="mt-2"><strong>莱布尼茨判别法</strong>：若 \\(\\{u_n\\}\\) 单调递减且 \\(\\lim_{n\\to\\infty}u_n=0\\)，则交错级数收敛，且余项 \\(|R_n| \\leq u_{n+1}\\)。</p>
                `,
                exercises: [
                    { question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{(-1)^{n+1}}{n}\\) 的敛散性。', answer: '\\(u_n=1/n\\) 递减趋于0，满足莱布尼茨条件，级数收敛（条件收敛）。' },
                    { question: '判断 \\(\\sum_{n=1}^{\\infty} (-1)^n \\frac{\\ln n}{n}\\) 的敛散性。', answer: 'f(x)=lnx/x 当x>e时递减，且 lim lnx/x = 0，故级数收敛。' }
                ]
            },
            {
                id: 'general',
                title: '一般项级数',
                definition: `
                    <p><strong>绝对收敛</strong>：若 \\(\\sum |u_n|\\) 收敛，则 \\(\\sum u_n\\) 必收敛，称绝对收敛。</p>
                    <p><strong>条件收敛</strong>：级数收敛但不绝对收敛，称条件收敛。</p>
                    <p class="mt-2"><strong>阿贝尔判别法</strong>：\\(\\{a_n\\}\\) 单调有界，\\(\\sum b_n\\) 收敛 \\(\\Rightarrow \\sum a_n b_n\\) 收敛。</p>
                    <p><strong>狄利克雷判别法</strong>：\\(\\{a_n\\}\\) 单调趋于0，\\(\\sum b_n\\) 部分和有界 \\(\\Rightarrow \\sum a_n b_n\\) 收敛。</p>
                `,
                exercises: [
                    { question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{\\sin n}{n^2}\\) 收敛类型。', answer: '\\(|\\frac{\\sin n}{n^2}| \\leq \\frac{1}{n^2}\\)，故绝对收敛。' },
                    { question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{(-1)^n}{n^p}\\) (p>0) 的敛散性。', answer: 'p>1 绝对收敛；0<p≤1 条件收敛；p≤0 发散。' }
                ]
            },
            {
                id: 'rearrangement',
                title: '级数的重排',
                definition: `
                    <p><strong>定义</strong>：改变级数各项顺序得到的新级数称为原级数的重排。</p>
                    <p class="mt-2"><strong>绝对收敛级数性质</strong>：绝对收敛级数的任意重排仍收敛，且和不变。</p>
                    <p class="mt-2"><strong>黎曼重排定理</strong>：条件收敛级数可通过重排使其收敛到任意实数，或发散到 ±∞。</p>
                `,
                exercises: [
                    { question: '条件收敛级数重排后是否一定收敛？', answer: '不一定。根据黎曼定理，可重排为发散级数，或收敛到任意指定值。' },
                    { question: '绝对收敛级数重排后是否仍绝对收敛？', answer: '是的，重排后仍绝对收敛，且和保持不变。' }
                ]
            },
            {
                id: 'power-interval',
                title: '幂级数的收敛区间',
                definition: `
                    <p><strong>定义</strong>：\\(\\sum_{n=0}^{\\infty} a_n (x-x_0)^n\\) 称为幂级数，x₀ 为展开中心。</p>
                    <p class="mt-2"><strong>阿贝尔定理</strong>：幂级数在 x₁ 处收敛，则对所有 |x-x₀|<|x₁-x₀| 的点绝对收敛；在 x₂ 处发散，则对所有 |x-x₀|>|x₂-x₀| 的点发散。</p>
                    <p class="mt-2"><strong>收敛半径公式</strong>：设 \\(\\lim_{n\\to\\infty}\\left|\\frac{a_{n+1}}{a_n}\\right|=\\rho\\)，则收敛半径 \\(R=\\frac{1}{\\rho}\\)（ρ=0时R=+∞；ρ=+∞时R=0）。</p>
                `,
                exercises: [
                    { question: '求 \\(\\sum_{n=1}^{\\infty} \\frac{x^n}{n}\\) 的收敛域。', answer: 'R=1；x=1发散，x=-1收敛，收敛域为 [-1, 1)。' },
                    { question: '求 \\(\\sum_{n=0}^{\\infty} \\frac{x^n}{n!}\\) 的收敛半径。', answer: 'ρ=0，R=+∞，收敛域为 (-∞, +∞)。' }
                ]
            },
            {
                id: 'power-properties',
                title: '幂级数的性质',
                definition: `
                    <p><strong>内闭一致收敛</strong>：幂级数在收敛区间内任一闭区间上一致收敛。</p>
                    <p class="mt-2"><strong>和函数连续性</strong>：和函数在收敛区间内连续。</p>
                    <p class="mt-2"><strong>逐项求导</strong>：幂级数在收敛区间内可逐项求导，收敛半径不变：
                    \\(\\left(\\sum a_n x^n\\right)' = \\sum n a_n x^{n-1}\\)</p>
                    <p class="mt-2"><strong>逐项积分</strong>：幂级数在收敛区间内可逐项积分，收敛半径不变：
                    \\(\\int_0^x \\sum a_n t^n dt = \\sum \\frac{a_n}{n+1}x^{n+1}\\)</p>
                `,
                exercises: [
                    { question: '逐项求导后收敛域是否一定不变？', answer: '收敛半径不变，但端点处敛散性可能改变。如 ∑xⁿ/n 逐项求导后收敛域由 [-1,1) 变为 (-1,1)。' },
                    { question: '幂级数和函数在收敛区间内是否任意阶可导？', answer: '是的，可逐项求导任意次，且每次求导收敛半径不变。' }
                ]
            },
            {
                id: 'power-operation',
                title: '幂级数的运算',
                definition: `
                    <p><strong>加减运算</strong>：\\(\\sum a_n x^n \\pm \\sum b_n x^n = \\sum (a_n\\pm b_n)x^n\\)，收敛半径 \\(R \\geq \\min\\{R_1,R_2\\}\\)。</p>
                    <p class="mt-2"><strong>柯西乘积</strong>：
                    \\(\\left(\\sum_{n=0}^\\infty a_n x^n\\right)\\left(\\sum_{n=0}^\\infty b_n x^n\\right) = \\sum_{n=0}^\\infty c_n x^n\\)，
                    其中 \\(c_n = \\sum_{k=0}^n a_k b_{n-k}\\)。</p>
                `,
                exercises: [
                    { question: '求 \\(\\sum_{n=0}^\\infty x^n\\) 与 \\(\\sum_{n=0}^\\infty n x^n\\) 的柯西乘积。', answer: '\\(c_n = \\sum_{k=0}^n k = \\frac{n(n+1)}{2}\\)，乘积为 \\(\\sum_{n=0}^\\infty \\frac{n(n+1)}{2}x^n\\)，|x|<1。' },
                    { question: '两个幂级数相除收敛半径是否一定不小于 min{R₁,R₂}？', answer: '不一定，除法可能使收敛半径变小。' }
                ]
            },
            {
                id: 'taylor',
                title: '泰勒级数',
                definition: `
                    <p><strong>定义</strong>：f(x) 在 x₀ 处任意阶可导，则称 \\(\\sum_{n=0}^\\infty \\frac{f^{(n)}(x_0)}{n!}(x-x_0)^n\\) 为 f 在 x₀ 处的泰勒级数。x₀=0 时称麦克劳林级数。</p>
                    <p class="mt-2"><strong>展开充要条件</strong>：f 在邻域内能展开为泰勒级数 \\(\\iff \\lim_{n\\to\\infty} R_n(x) = 0\\)，其中 Rₙ(x) 为泰勒余项。</p>
                `,
                exercises: [
                    { question: '任意阶可导函数是否一定能展开为泰勒级数？', answer: '不一定。如 f(x)=e^{-1/x²}(x≠0), f(0)=0，各阶导数均为0，泰勒级数不收敛到f(x)。' },
                    { question: '泰勒级数收敛是否一定收敛到原函数？', answer: '不一定，只有余项趋于0时才收敛到原函数。' }
                ]
            },
            {
                id: 'elementary-expand',
                title: '初等函数的幂级数展开',
                definition: `
                    <p><strong>常用麦克劳林展开</strong>：</p>
                    <ul class="space-y-1 mt-2 ml-4">
                        <li>\\(e^x = \\sum_{n=0}^\\infty \\frac{x^n}{n!}, \\quad x\\in\\mathbb{R}\\)</li>
                        <li>\\(\\sin x = \\sum_{n=0}^\\infty (-1)^n \\frac{x^{2n+1}}{(2n+1)!}, \\quad x\\in\\mathbb{R}\\)</li>
                        <li>\\(\\cos x = \\sum_{n=0}^\\infty (-1)^n \\frac{x^{2n}}{(2n)!}, \\quad x\\in\\mathbb{R}\\)</li>
                        <li>\\(\\ln(1+x) = \\sum_{n=1}^\\infty (-1)^{n+1}\\frac{x^n}{n}, \\quad x\\in(-1,1]\\)</li>
                        <li>\\(\\frac{1}{1-x} = \\sum_{n=0}^\\infty x^n, \\quad |x|<1\\)</li>
                    </ul>
                `,
                exercises: [
                    { question: '展开 arctan x 为麦克劳林级数。', answer: '逐项积分 1/(1+x²) 的展开式，得 \\(\\arctan x = \\sum_{n=0}^\\infty (-1)^n \\frac{x^{2n+1}}{2n+1}, \\quad x\\in[-1,1]\\)。' },
                    { question: '展开 e^{-x²} 为麦克劳林级数。', answer: '代入 eˣ 展开式，得 \\(e^{-x^2} = \\sum_{n=0}^\\infty (-1)^n \\frac{x^{2n}}{n!}, \\quad x\\in\\mathbb{R}\\)。' }
                ]
            },
            {
                id: 'trig-orthogonal',
                title: '三角级数与三角函数系的正交',
                definition: `
                    <p><strong>三角级数</strong>：形如 \\(\\frac{a_0}{2} + \\sum_{n=1}^\\infty (a_n\\cos nx + b_n\\sin nx)\\) 的级数。</p>
                    <p class="mt-2"><strong>三角函数系正交性</strong>：在 [-π, π] 上，任意两个不同函数的乘积积分等于0：
                    <ul class="list-disc list-inside mt-1 ml-4">
                        <li>\\(\\int_{-\\pi}^\\pi \\cos nx dx = \\int_{-\\pi}^\\pi \\sin nx dx = 0\\)</li>
                        <li>\\(\\int_{-\\pi}^\\pi \\cos mx\\cos nx dx = 0\\ (m≠n)\\)</li>
                        <li>\\(\\int_{-\\pi}^\\pi \\sin mx\\sin nx dx = 0\\ (m≠n)\\)</li>
                        <li>\\(\\int_{-\\pi}^\\pi \\cos mx\\sin nx dx = 0\\)</li>
                    </ul>
                `,

                `,

                    { question: '满足拉普拉斯方程 ∂²u/∂x² + ∂²u/∂y² = 0 的函数叫什么？', answer: '称为调和函数。' }

            },
            {

                    \\(f(P_2)-f(P_1) = f_x(P_\\theta)\\Delta x + f_y(P_\\theta)\\Delta y\\)
                    其中 P_θ = (x₁+θΔx, y₁+θΔy)。</p>
                    <p class="mt-2"><strong>推论</strong>：区域 D 上 fₓ≡0, fᵧ≡0 ⇒ f 在 D 上为常数。</p>

                    \\(f(x_0+h,y_0+k) = \\sum_{m=0}^n \\frac{1}{m!}\\left(h\\frac{\\partial}{\\partial x}+k\\frac{\\partial}{\\partial y}\\right)^m f(x_0,y_0) + R_n\\)

                exercises: [

        // ===================== 渲染函数 =====================
        function renderChapter(data, contentId, sidebarId) {
            const content = document.getElementById(contentId);
            const sidebar = document.getElementById(sidebarId);
            
            let contentHtml = '';
            let sidebarHtml = '';

            data.forEach(item => {
                // 侧边栏
                sidebarHtml += `
                    <a href="#${item.id}" class="sidebar-item block px-3 py-2 rounded text-gray-700 hover:bg-blue-50 transition" onclick="setActiveSidebar('${item.id}', '${sidebarId}')">
                        ${item.title}
                    </a>
                `;

                // 内容卡片
                let exercisesHtml = '';
                item.exercises.forEach((ex, idx) => {
                    exercisesHtml += `
                        <div class="border rounded-lg p-4 bg-gray-50">
                            <p class="font-medium text-gray-800">习题 ${idx+1}：${ex.question}</p>
                            <button onclick="toggleAnswer(this)" class="mt-2 text-sm text-blue-600 hover:text-blue-800 font-medium">
                                ▼ 查看答案
                            </button>
                            <div class="answer-content text-gray-700 mt-2 pl-2 border-l-2 border-blue-300">
                                <p>${ex.answer}</p>
                            </div>
                        </div>
                    `;
                });

                contentHtml += `
                    <section id="${item.id}" class="bg-white rounded-xl shadow-sm p-6 scroll-mt-24">
                        <h2 class="text-xl font-bold text-gray-800 border-b pb-2 mb-4">${item.title}</h2>
                        <div class="mb-5 text-gray-700 leading-relaxed">
                            <h3 class="font-semibold text-gray-800 mb-2">📖 知识点定义</h3>
                            ${item.definition}
                        </div>
                        <div>
                            <h3 class="font-semibold text-gray-800 mb-3">✏️ 习题与答案</h3>
                            <div class="space-y-3">
                                ${exercisesHtml}
                            </div>
                        </div>
                    </section>
                `;
            });

            content.innerHTML = contentHtml;
            sidebar.innerHTML = sidebarHtml;

            // MathJax重新渲染
            if (window.MathJax) {
                MathJax.typesetPromise([content]);
            }
        }

        function toggleAnswer(btn) {
            const answer = btn.nextElementSibling;
            answer.classList.toggle('show');
            btn.textContent = answer.classList.contains('show') ? '▲ 收起答案' : '▼ 查看答案';
        }

        function switchChapter(chapter) {
            // 切换选项卡样式
            document.querySelectorAll('.chapter-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            // 切换内容
            document.querySelectorAll('.chapter-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('content-' + chapter).classList.remove('hidden');

            // 切换侧边栏
            document.querySelectorAll('.sidebar-chapter').forEach(s => s.classList.add('hidden'));
            document.getElementById('sidebar-' + chapter).classList.remove('hidden');
        }

        function setActiveSidebar(id, sidebarId) {
            setTimeout(() => {
                document.querySelectorAll('#' + sidebarId + ' .sidebar-item').forEach(item => {
                    item.classList.remove('active');
                });
                document.querySelector('#' + sidebarId + ' a[href="#' + id + '"]').classList.add('active');
            }, 100);
        }

        // 初始化
        window.onload = function() {
            renderChapter(seriesData, 'content-series', 'sidebar-series');
            renderChapter(multivariableData, 'content-multivariable', 'sidebar-multivariable');
        };
    </script>
