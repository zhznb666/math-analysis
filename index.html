    <script>
        // 知识点数据
        const seriesData = [
            {
                id: 'convergence',
                title: '级数的收敛性',
                definition: `
                    <p><strong>定义</strong>：设级数 \\(\\sum_{n=1}^{\\infty} u_n\\)，其部分和数列为 \\(\\{S_n\\}\\)，其中 \\(S_n = \\sum_{k=1}^{n} u_k\\)。</p>
                    <p class="mt-2">若 \\(\\lim_{n \\to \\infty} S_n = S\\) 存在且有限，则称级数<strong>收敛</strong>，并称 \\(S\\) 为级数的和，记作 \\(\\sum_{n=1}^{\\infty} u_n = S\\)；否则称级数<strong>发散</strong>。</p>
                    <p class="mt-2"><strong>柯西收敛准则</strong>：级数 \\(\\sum u_n\\) 收敛的充要条件是：对任意 \\(\\varepsilon > 0\\)，存在正整数 \\(N\\)，当 \\(n > N\\) 时，对任意正整数 \\(p\\)，都有</p>
                    <p class="text-center my-2">\\(|u_{n+1} + u_{n+2} + \\cdots + u_{n+p}| < \\varepsilon\\)</p>
                `,
                exercises: [
                    {
                        question: '判断级数 \\(\\sum_{n=1}^{\\infty} \\frac{1}{n(n+1)}\\) 的敛散性，若收敛求其和。',
                        answer: '利用裂项相消法：\\(\\frac{1}{n(n+1)} = \\frac{1}{n} - \\frac{1}{n+1}\\)，部分和 \\(S_n = 1 - \\frac{1}{n+1} \\to 1\\)。故级数收敛，和为1。'
                    },
                    {
                        question: '证明：若级数 \\(\\sum u_n\\) 收敛，则 \\(\\lim_{n \\to \\infty} u_n = 0\\)。',
                        answer: '由柯西准则，取 p=1，得 |u_{n+1}| < ε，即 lim u_n = 0。注意：逆命题不成立，如调和级数。'
                    }
                ]
            },
            {
                id: 'positive1',
                title: '正项级数（1）- 比较判别法',
                definition: `
                    <p><strong>定义</strong>：若 \\(u_n \\geq 0\\)（\\(n=1,2,\\cdots\\)），则称 \\(\\sum u_n\\) 为正项级数。</p>
                    <p class="mt-2"><strong>基本定理</strong>：正项级数收敛的充要条件是其部分和数列有上界。</p>
                    <p class="mt-2"><strong>比较判别法</strong>：设 \\(\\sum u_n\\) 和 \\(\\sum v_n\\) 都是正项级数，且存在 \\(N\\)，当 \\(n > N\\) 时 \\(u_n \\leq v_n\\)，则</p>
                    <ul class="list-disc list-inside mt-1 ml-4">
                        <li>若 \\(\\sum v_n\\) 收敛，则 \\(\\sum u_n\\) 收敛</li>
                        <li>若 \\(\\sum u_n\\) 发散，则 \\(\\sum v_n\\) 发散</li>
                    </ul>
                    <p class="mt-2"><strong>比较判别法的极限形式</strong>：设 \\(\\lim_{n \\to \\infty} \\frac{u_n}{v_n} = l\\)，则</p>
                    <ul class="list-disc list-inside mt-1 ml-4">
                        <li>当 \\(0 < l < +\\infty\\) 时，两级数同敛散</li>
                        <li>当 \\(l = 0\\) 时，若 \\(\\sum v_n\\) 收敛则 \\(\\sum u_n\\) 收敛</li>
                        <li>当 \\(l = +\\infty\\) 时，若 \\(\\sum v_n\\) 发散则 \\(\\sum u_n\\) 发散</li>
                    </ul>
                `,
                exercises: [
                    {
                        question: '判断 \\(\\sum_{n=1}^{\\infty} \\sin\\frac{1}{n}\\) 的敛散性。',
                        answer: '由 lim_{n→∞} sin(1/n) / (1/n) = 1，而调和级数 ∑1/n 发散，故原级数发散。'
                    },
                    {
                        question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{1}{2^n - n}\\) 的敛散性。',
                        answer: 'lim_{n→∞} [1/(2^n - n)] / (1/2^n) = 1，而等比级数 ∑1/2^n 收敛，故原级数收敛。'
                    }
                ]
            },
            {
                id: 'ratio',
                title: '正项级数 - 比式判别法（达朗贝尔）',
                definition: `
                    <p><strong>达朗贝尔判别法</strong>：设 \\(\\sum u_n\\) 为正项级数，且 \\(\\lim_{n \\to \\infty} \\frac{u_{n+1}}{u_n} = q\\)，则</p>
                    <ul class="list-disc list-inside mt-2 ml-4">
                        <li>当 \\(q < 1\\) 时，级数收敛</li>
                        <li>当 \\(q > 1\\) 或 \\(q = +\\infty\\) 时，级数发散</li>
                        <li>当 \\(q = 1\\) 时，判别法失效</li>
                    </ul>
                    <p class="mt-2 text-gray-600 text-sm">注：适用于通项含阶乘、指数形式的级数。当 q=1 时，级数可能收敛也可能发散，如 p-级数。</p>
                `,
                exercises: [
                    {
                        question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{n!}{n^n}\\) 的敛散性。',
                        answer: 'u_{n+1}/u_n = (n+1)! / (n+1)^{n+1} · n^n / n! = (n/(n+1))^n → 1/e < 1，故级数收敛。'
                    },
                    {
                        question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{2^n n!}{n^n}\\) 的敛散性。',
                        answer: 'u_{n+1}/u_n = 2 · (n/(n+1))^n → 2/e < 1，级数收敛。'
                    }
                ]
            },
            {
                id: 'root',
                title: '正项级数 - 根式判别法（柯西）',
                definition: `
                    <p><strong>柯西根式判别法</strong>：设 \\(\\sum u_n\\) 为正项级数，且 \\(\\lim_{n \\to \\infty} \\sqrt[n]{u_n} = q\\)，则</p>
                    <ul class="list-disc list-inside mt-2 ml-4">
                        <li>当 \\(q < 1\\) 时，级数收敛</li>
                        <li>当 \\(q > 1\\) 或 \\(q = +\\infty\\) 时，级数发散</li>
                        <li>当 \\(q = 1\\) 时，判别法失效</li>
                    </ul>
                    <p class="mt-2"><strong>关系</strong>：若 \\(\\lim \\frac{u_{n+1}}{u_n} = q\\)，则必有 \\(\\lim \\sqrt[n]{u_n} = q\\)，即根式判别法比比式判别法适用范围更广。</p>
                `,
                exercises: [
                    {
                        question: '判断 \\(\\sum_{n=1}^{\\infty} \\left(\\frac{n}{2n+1}\\right)^n\\) 的敛散性。',
                        answer: '√[n]{u_n} = n/(2n+1) → 1/2 < 1，故级数收敛。'
                    },
                    {
                        question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{n^2}{(2+1/n)^n}\\) 的敛散性。',
                        answer: '√[n]{u_n} = √[n]{n²} / (2+1/n) → 1/2 < 1，级数收敛。'
                    }
                ]
            },
            {
                id: 'integral',
                title: '正项级数 - 积分判别法',
                definition: `
                    <p><strong>积分判别法</strong>：设 f(x) 为 [1, +∞) 上非负递减函数，则正项级数 \\(\\sum_{n=1}^{\\infty} f(n)\\) 与反常积分 \\(\\int_{1}^{+\\infty} f(x)dx\\) 同敛散。</p>
                    <p class="mt-2"><strong>p-级数</strong>：\\(\\sum_{n=1}^{\\infty} \\frac{1}{n^p}\\)</p>
                    <ul class="list-disc list-inside mt-1 ml-4">
                        <li>当 p > 1 时收敛</li>
                        <li>当 p ≤ 1 时发散</li>
                    </ul>
                    <p class="mt-2 text-gray-600 text-sm">常用于比较判别法的参照级数，是判断级数敛散性的重要标尺。</p>
                `,
                exercises: [
                    {
                        question: '判断 \\(\\sum_{n=2}^{\\infty} \\frac{1}{n \\ln n}\\) 的敛散性。',
                        answer: '考虑积分 ∫₂^∞ 1/(x ln x) dx = ln ln x |₂^∞ = +∞，积分发散，故级数发散。'
                    },
                    {
                        question: '判断 \\(\\sum_{n=2}^{\\infty} \\frac{1}{n (\\ln n)^2}\\) 的敛散性。',
                        answer: '∫₂^∞ 1/(x (ln x)²) dx = -1/ln x |₂^∞ = 1/ln 2，积分收敛，故级数收敛。'
                    }
                ]
            },
            {
                id: 'alternating',
                title: '交错级数',
                definition: `
                    <p><strong>定义</strong>：各项符号正负相间的级数称为交错级数，形如 \\(\\sum_{n=1}^{\\infty} (-1)^{n+1} u_n\\)，其中 \\(u_n > 0\\)。</p>
                    <p class="mt-2"><strong>莱布尼茨判别法</strong>：若交错级数满足：</p>
                    <ol class="list-decimal list-inside mt-1 ml-4">
                        <li>数列 \\(\\{u_n\\}\\) 单调递减</li>
                        <li>\\(\\lim_{n \\to \\infty} u_n = 0\\)</li>
                    </ol>
                    <p class="mt-2">则级数收敛，且其余项满足 \\(|R_n| \\leq u_{n+1}\\)。</p>
                `,
                exercises: [
                    {
                        question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{(-1)^{n+1}}{n}\\) 的敛散性。',
                        answer: 'u_n = 1/n 单调递减趋于0，由莱布尼茨判别法，级数收敛（条件收敛）。'
                    },
                    {
                        question: '判断 \\(\\sum_{n=1}^{\\infty} (-1)^n \\frac{\\ln n}{n}\\) 的敛散性。',
                        answer: '设 f(x) = ln x / x，f\'(x) = (1 - ln x)/x² < 0 (x > e)，故 n≥3 时 u_n 递减，且 lim u_n = 0，级数收敛。'
                    }
                ]
            },
            {
                id: 'general',
                title: '一般项级数',
                definition: `
                    <p><strong>绝对收敛</strong>：若 \\(\\sum |u_n|\\) 收敛，则称 \\(\\sum u_n\\) 绝对收敛。绝对收敛的级数必收敛。</p>
                    <p class="mt-2"><strong>条件收敛</strong>：若 \\(\\sum u_n\\) 收敛，但 \\(\\sum |u_n|\\) 发散，则称级数条件收敛。</p>
                    <p class="mt-2"><strong>阿贝尔判别法</strong>：若 \\(\\{a_n\\}\\) 单调有界，且 \\(\\sum b_n\\) 收敛，则 \\(\\sum a_n b_n\\) 收敛。</p>
                    <p class="mt-2"><strong>狄利克雷判别法</strong>：若 \\(\\{a_n\\}\\) 单调趋于0，且 \\(\\sum b_n\\) 的部分和有界，则 \\(\\sum a_n b_n\\) 收敛。</p>
                `,
                exercises: [
                    {
                        question: '判断 \\(\\sum_{n=1}^{\\infty} \\frac{\\sin n}{n^2}\\) 是绝对收敛、条件收敛还是发散。',
                        answer: '|sin n / n²| ≤ 1/n²，而 ∑1/n² 收敛，故原级数绝对收敛。'
                    },
                    {
                        question: '判断 \\(\\sum_{n=1}^{\\infty} (-1)^n \\frac{1}{n^p}\\) 的敛散性（p>0）。',
                        answer: 'p>1 时绝对收敛；0<p≤1 时条件收敛；p≤0 时发散。'
                    }
                ]
            },
            {
                id: 'rearrangement',
                title: '级数的重排',
                definition: `
                    <p><strong>定义</strong>：设 \\(\\sum u_n\\) 为一级数，\\(\\sigma: \\mathbb{N} \\to \\mathbb{N}\\) 是一一映射，则 \\(\\sum u_{\\sigma(n)}\\) 称为原级数的一个重排。</p>
                    <p class="mt-2"><strong>定理</strong>：若级数绝对收敛，则其任意重排也收敛，且和不变。</p>
                    <p class="mt-2"><strong>黎曼重排定理</strong>：若级数条件收敛，则对任意实数 S（或 ±∞），都存在该级数的重排，使其和为 S。</p>
                    <p class="mt-2 text-gray-600 text-sm">这揭示了条件收敛与绝对收敛的本质区别：绝对收敛级数具有可交换性，条件收敛则不然。</p>
                `,
                exercises: [
                    {
                        question: '条件收敛级数重排后是否一定收敛？',
                        answer: '不一定。根据黎曼重排定理，条件收敛级数可以通过重排使其发散，或收敛到任意指定的实数。'
                    },
                    {
                        question: '绝对收敛级数的任意重排都绝对收敛吗？',
                        answer: '是的。绝对收敛级数重排后不仅收敛，而且仍然绝对收敛，和保持不变。'
                    }
                ]
            },
            {
                id: 'power-interval',
                title: '幂级数的收敛区间',
                definition: `
                    <p><strong>定义</strong>：形如 \\(\\sum_{n=0}^{\\infty} a_n (x - x_0)^n\\) 的函数项级数称为幂级数。</p>
                    <p class="mt-2"><strong>阿贝尔定理</strong>：若幂级数在 \\(x = x_1 \\neq x_0\\) 处收敛，则对一切满足 \\(|x - x_0| < |x_1 - x_0|\\) 的 x，幂级数绝对收敛；若在 \\(x = x_2\\) 处发散，则对一切满足 \\(|x - x_0| > |x_2 - x_0|\\) 的 x，幂级数发散。</p>
                    <p class="mt-2"><strong>收敛半径</strong>：设 \\(\\lim_{n \\to \\infty} \\left|\\frac{a_{n+1}}{a_n}\\right| = \\rho\\)（或 \\(\\lim \\sqrt[n]{|a_n|} = \\rho\\)），则收敛半径</p>
                    <p class="text-center my-2">\\(R = \\begin{cases} \\frac{1}{\\rho}, & 0 < \\rho < +\\infty \\\\ +\\infty, & \\rho = 0 \\\\ 0, & \\rho = +\\infty \\end{cases}\\)</p>
                `,
                exercises: [
                    {
                        question: '求幂级数 \\(\\sum_{n=1}^{\\infty} \\frac{x^n}{n}\\) 的收敛半径与收敛域。',
                        answer: 'ρ = lim |a_{n+1}/a_n| = lim n/(n+1) = 1，R = 1。x=1 时发散，x=-1 时收敛，收敛域为 [-1, 1)。'
                    },
                    {
                        question: '求幂级数 \\(\\sum_{n=0}^{\\infty} \\frac{x^n}{n!}\\) 的收敛半径。',
                        answer: 'ρ = lim 1/(n+1) = 0，故 R = +∞，收敛域为 (-∞, +∞)。'
                    }
                ]
            },
            {
                id: 'power-properties',
                title: '幂级数的性质',
                definition: `
                    <p><strong>内闭一致收敛</strong>：幂级数在其收敛区间内的任一闭区间上一致收敛。</p>
                    <p class="mt-2"><strong>和函数的连续性</strong>：幂级数的和函数在收敛区间内连续。</p>
                    <p class="mt-2"><strong>逐项求导</strong>：幂级数在收敛区间内可逐项求导，且收敛半径不变：</p>
                    <p class="text-center my-2">\\(\\left(\\sum_{n=0}^{\\infty} a_n x^n\\right)' = \\sum_{n=1}^{\\infty} n a_n x^{n-1}\\)</p>
                    <p class="mt-2"><strong>逐项积分</strong>：幂级数在收敛区间内可逐项积分，且收敛半径不变：</p>
                    <p class="text-center my-2">\\(\\int_{0}^{x} \\sum_{n=0}^{\\infty} a_n t^n dt = \\sum_{n=0}^{\\infty} \\frac{a_n}{n+1} x^{n+1}\\)</p>
                `,
                exercises: [
                    {
                        question: '幂级数逐项求导后收敛半径是否改变？收敛域呢？',
                        answer: '收敛半径不变，但收敛域可能改变。例如 ∑x^n/n 的收敛域为 [-1,1)，逐项求导后 ∑x^{n-1} 收敛域为 (-1,1)。'
                    },
                    {
                        question: '幂级数的和函数在收敛区间内是否一定可导？',
                        answer: '是的，幂级数的和函数在收敛区间内任意阶可导，且可逐项求导任意次。'
                    }
                ]
            },
            {
                id: 'power-operation',
